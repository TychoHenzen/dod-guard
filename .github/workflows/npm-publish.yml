# CI + Publish — triggers on master pushes only (not tags).
# Publish jobs check whether a matching tag points at the pushed commit.
#
# Publish tag format: <package>-v<version>
#   dod-guard-v2.2.4 | evomcp-v0.1.3 | gitevo-v0.1.3 | obsidian-rag-v0.1.10

name: ci

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (dod-guard, evomcp, gitevo, obsidian-rag, or "all")'
        required: true
        type: choice
        default: 'all'
        options:
          - dod-guard
          - evomcp
          - gitevo
          - obsidian-rag
          - all

jobs:
  # ── Always runs ──────────────────────────────────────────────────────

  build-test:
    runs-on: ubuntu-latest
    # Export which release tags point at HEAD — publish jobs filter on this.
    outputs:
      tags: ${{ steps.tag-detect.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - id: tag-detect
        run: |
          TAGS=$(git tag --points-at HEAD | grep -- '-v' | paste -sd ',' - || true)
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

  static-analysis:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Autofix: apply Biome fixes, commit + push if any changes.
      - name: Biome autofix
        run: npx @biomejs/biome check --write --unsafe packages/*/src/ --no-errors-on-unmatched
      - name: Commit & push autofixes
        run: |
          if ! git diff --exit-code --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: apply stricter Biome autofixes [skip ci]"
            git push origin master
          fi

      # Strict check: must be clean after autofix.
      - name: Biome strict check
        run: npx @biomejs/biome check packages/*/src/ --max-diagnostics=200 --no-errors-on-unmatched

      # Coverage gaps
      - name: Missing test coverage
        run: |
          echo "=== Missing test coverage ==="
          for pkg in dod-guard evomcp gitevo obsidian-rag; do
            srcs=$(find packages/$pkg/src -name '*.ts' ! -name '*.test.ts' ! -name 'types.ts' ! -name 'constants.ts' | sort)
            for f in $srcs; do
              base=$(basename "$f" .ts)
              dir=$(dirname "$f")
              test_file="${dir}/${base}.test.ts"
              if [ ! -f "$test_file" ]; then
                echo "  ⚠ $f — no matching test file"
              fi
            done
          done
          echo "=== Done ==="

      # Brevity checks
      - name: Brevity — files > 300 lines
        run: |
          echo "=== Brevity: files > 300 lines ==="
          find packages/*/src -name '*.ts' ! -name '*.test.ts' -exec wc -l {} + | awk '$1 > 300 {print "  ⚠", $2, "(" $1 " lines)"}'
          echo "=== Done ==="

  # ── Publish: fires when matching tag points at HEAD AND static-analysis passes ──

  publish-dod-guard:
    needs: [build-test, static-analysis]
    if: contains(needs.build-test.outputs.tags, 'dod-guard-v') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'dod-guard' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run bundle -w packages/dod-guard
      - run: npm publish -w packages/dod-guard

  publish-evomcp:
    needs: [build-test, static-analysis]
    if: contains(needs.build-test.outputs.tags, 'evomcp-v') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'evomcp' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run bundle -w packages/evomcp
      - run: npm publish -w packages/evomcp

  publish-gitevo:
    needs: [build-test, static-analysis]
    if: contains(needs.build-test.outputs.tags, 'gitevo-v') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'gitevo' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run bundle -w packages/gitevo
      - run: npm publish -w packages/gitevo

  publish-obsidian-rag:
    needs: [build-test, static-analysis]
    if: contains(needs.build-test.outputs.tags, 'obsidian-rag-v') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.package == 'obsidian-rag' || github.event.inputs.package == 'all'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run bundle -w packages/obsidian-rag
      - run: npm publish -w packages/obsidian-rag
