# Publish monorepo packages to npm via Trusted Publisher (OIDC).
# Trusted Publishers must be configured at npmjs.com:
#   - TychoHenzen/dod-guard  → dod-guard
#   - TychoHenzen/dod-guard  → obsidian-rag
#   - TychoHenzen/dod-guard  → evomcp
#   - TychoHenzen/dod-guard  → gitevo
#
# Tag format: <package>-v<version>
#   dod-guard-v2.2.1 | obsidian-rag-v0.1.0 | evomcp-v0.1.1 | gitevo-v0.1.1

name: npm publish

on:
  push:
    tags:
      - 'dod-guard-v*'
      - 'obsidian-rag-v*'
      - 'evomcp-v*'
      - 'gitevo-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (dod-guard, obsidian-rag, evomcp, gitevo, or "all")'
        required: true
        type: choice
        default: 'all'
        options:
          - dod-guard
          - obsidian-rag
          - evomcp
          - gitevo
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  publish-dod-guard:
    needs: build
    if: startsWith(github.ref, 'refs/tags/dod-guard-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish -w packages/dod-guard

  publish-obsidian-rag:
    needs: build
    if: startsWith(github.ref, 'refs/tags/obsidian-rag-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish -w packages/obsidian-rag

  publish-evomcp:
    needs: build
    if: startsWith(github.ref, 'refs/tags/evomcp-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish -w packages/evomcp

  publish-gitevo:
    needs: build
    if: startsWith(github.ref, 'refs/tags/gitevo-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish -w packages/gitevo
