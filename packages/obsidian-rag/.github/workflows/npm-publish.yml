# Publish obsidian-rag to npm via Trusted Publisher (OIDC).
# Requires Trusted Publisher configured at npmjs.com: TychoHenzen/obsidian-rag
#
# Monorepo: workspaces at packages/*, publish from packages/obsidian-rag

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish -w packages/obsidian-rag
